<!DOCTYPE html>

<head>

  <style>
    #main {

      margin: auto;

    #top {
      width: 1000px;
      height: 65px;
      margin: auto;
      /* background: lightsalmon; */
    }

    #left {
      width: 215px;
      height: calc(768px - 65px - 20px);
      margin-left: 12px;
      float: left;
      /* background: lawngreen; */
    }

    #menu {
      width: 215px;
      height: calc(768px - 65px - 20px - 25px);
      /* text-align: center; */

      div {
        font-family: "標楷體";
        font-size: 24px;
        color: #FF00FF;
        font-weight: 500;
        text-decoration: underline;
        text-align: center;
        /* display: inline-block;
        border-bottom: 1px solid black; */
      }

      td {
        width: 215px;
        height: 35px;
        font-family: "標楷體";
        font-size: 16;
        color: #000;
        text-align: center;
        background: url("./images/menu1.png") no-repeat center;
      }

      td:hover {
        background: url("./images/menu2.png") no-repeat center;
      }
    }

    #update {
      width: 215px;
      height: 25px;
      font-family: "標楷體";
      font-size: 16;
      color: #000;
      text-align: center;
    }

    #right {
      width: 770px;
      height: calc(768px - 65px - 20px);
      float: right;
      margin-right: 12px;
      /* background: #e8e525; */
    }

    marquee {
      width: 770px;
      height: 29px;
      font-family: "標楷體";
      font-size: 24px;
      color: #00f;
      /* marquee 會向下5px 加上此行可消除 */
      vertical-align: middle;
    }

    iframe {
      width: 770px;
      height: calc(768px - 65px - 20px - 29px);
      /* margin-top: -5px; */
    }

    #footer {
      width: 1000px;
      height: 20px;
      clear: both;
      margin: auto;
      background: lightsteelblue;
      font-family: 標楷體;
      font-size: 16;
      color: #000;
      text-align: center;
    }
  </style>
</head>

<body>
  <div id="main">

    <div id="footer">網頁設計及維護：06鮑家歆</div>
